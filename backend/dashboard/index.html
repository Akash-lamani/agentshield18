<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentShield Dashboard</title>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e;
      --critical: #ff4d4f; --high: #ff7a00; --medium: #f0c040;
      --low: #58a6ff; --info: #8b949e;
      --grade-a: #3fb950; --grade-b: #58a6ff; --grade-c: #f0c040;
      --grade-d: #ff7a00; --grade-f: #ff4d4f; --accent: #238636;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 14px; min-height: 100vh; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .header { display: flex; align-items: center; gap: 20px; padding: 20px 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; }
    .score-ring { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bg3); stroke-width: 8; }
    .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1), stroke 0.4s; }
    .ring-score-text { font-size: 22px; font-weight: 700; fill: var(--text); dominant-baseline: central; text-anchor: middle; }
    .ring-label-text { font-size: 9px; fill: var(--text2); dominant-baseline: central; text-anchor: middle; }
    .header-info { flex: 1; min-width: 0; }
    .header-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .header-meta { color: var(--text2); font-size: 12px; line-height: 1.6; }
    .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 10px; font-size: 26px; font-weight: 900; }
    .framework-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 8px; }
    .refresh-btn { margin-left: auto; padding: 7px 14px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .refresh-btn:hover { opacity: 0.85; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .stat-card.critical .stat-value { color: var(--critical); }
    .stat-card.high .stat-value { color: var(--high); }
    .stat-card.medium .stat-value { color: var(--medium); }
    .stat-card.low .stat-value { color: var(--low); }
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
    .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); margin-bottom: 14px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { width: 110px; font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--low); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .bar-count { width: 32px; font-size: 12px; text-align: right; color: var(--text2); flex-shrink: 0; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
    .filter-select, .filter-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; }
    .filter-select:focus, .filter-input:focus { border-color: var(--low); }
    .filter-input { flex: 1; min-width: 160px; }
    .fix-all-btn { padding: 6px 14px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: auto; transition: opacity 0.2s; }
    .fix-all-btn:hover { opacity: 0.85; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: var(--bg3); color: var(--text2); font-weight: 600; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { color: var(--text); }
    th.sorted { color: var(--low); }
    td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; max-width: 240px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .sev-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    .sev-critical { background: rgba(255,77,79,.18); color: var(--critical); }
    .sev-high { background: rgba(255,122,0,.18); color: var(--high); }
    .sev-medium { background: rgba(240,192,64,.18); color: var(--medium); }
    .sev-low { background: rgba(88,166,255,.18); color: var(--low); }
    .sev-info { background: rgba(139,148,158,.18); color: var(--info); }
    .cat-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--bg3); color: var(--text2); white-space: nowrap; }
    .code { font-family: monospace; color: var(--text2); font-size: 11px; word-break: break-all; }
    .fix-chip { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: rgba(35,134,54,.2); color: var(--grade-a); }
    .no-findings { text-align: center; padding: 40px; color: var(--text2); }
    .no-data { text-align: center; padding: 60px; color: var(--text2); font-size: 16px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--low); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .count-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="shell"><div id="app"><div class="no-data"><span class="spinner"></span> Loading scan-results.json…</div></div></div>
<script>
(function(){
  "use strict";
  var allFindings=[],report=null,filterSeverity="all",filterCategory="all",filterText="",sortCol="severity",sortDir=1;
  var SEV_ORDER={critical:0,high:1,medium:2,low:3,info:4};
  function gradeColor(g){return{A:"#3fb950",B:"#58a6ff",C:"#f0c040",D:"#ff7a00",F:"#ff4d4f"}[g]||"#8b949e";}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function buildRing(score,grade){
    var R=42,CX=54,CY=54,SIZE=108,circ=2*Math.PI*R,dash=circ*(score/100),color=gradeColor(grade);
    return'<svg class="score-ring" width="'+SIZE+'" height="'+SIZE+'" viewBox="0 0 '+SIZE+' '+SIZE+'">'+
      '<circle class="ring-bg" cx="'+CX+'" cy="'+CY+'" r="'+R+'"/>'+
      '<circle class="ring-fill" cx="'+CX+'" cy="'+CY+'" r="'+R+'" stroke="'+color+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ-dash)+'"/>'+
      '<g transform="rotate(90,'+CX+','+CY+')">'+
      '<text class="ring-score-text" x="'+CX+'" y="'+(CY-8)+'">'+score+'</text>'+
      '<text class="ring-label-text" x="'+CX+'" y="'+(CY+10)+'">/ 100</text></g></svg>';
  }
  function buildBars(findings){
    var cats=["secrets","permissions","hooks","mcp","agents","injection","exposure","misconfiguration"],counts={};
    findings.forEach(function(f){counts[f.category]=(counts[f.category]||0)+1;});
    var max=Math.max(1,Math.max.apply(null,cats.map(function(c){return counts[c]||0;})));
    return cats.map(function(cat){
      var n=counts[cat]||0,pct=Math.round((n/max)*100);
      return'<div class="bar-row"><div class="bar-label">'+cat+'</div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="bar-count">'+n+'</div></div>';
    }).join("");
  }
  function sevBadge(sev){return'<span class="sev-badge sev-'+sev+'">'+sev+'</span>';}
  function applyFilters(){
    return allFindings
      .filter(function(f){return filterSeverity==="all"||f.severity===filterSeverity;})
      .filter(function(f){return filterCategory==="all"||f.category===filterCategory;})
      .filter(function(f){
        if(!filterText)return true;
        var q=filterText.toLowerCase();
        return(f.title||"").toLowerCase().includes(q)||(f.file||"").toLowerCase().includes(q)||(f.evidence||"").toLowerCase().includes(q)||(f.category||"").toLowerCase().includes(q);
      })
      .sort(function(a,b){
        var va,vb;
        if(sortCol==="severity"){va=SEV_ORDER[a.severity]??9;vb=SEV_ORDER[b.severity]??9;}
        else if(sortCol==="line"){va=a.line??0;vb=b.line??0;}
        else{va=(a[sortCol]||"").toString().toLowerCase();vb=(b[sortCol]||"").toString().toLowerCase();}
        return va<vb?-1*sortDir:va>vb?1*sortDir:0;
      });
  }
  function buildTable(findings){
    var cols=[{key:"severity",label:"Severity"},{key:"category",label:"Category"},{key:"title",label:"Title"},{key:"file",label:"File"},{key:"line",label:"Line"},{key:"evidence",label:"Evidence"},{key:"fix",label:"Fix"}];
    var ths=cols.map(function(c){return'<th data-col="'+c.key+'" class="'+(sortCol===c.key?"sorted":"")+'">'+c.label+(sortCol===c.key?(sortDir===1?" ↑":" ↓"):""+'')+'</th>';}).join("");
    if(!findings.length)return'<table><thead><tr>'+ths+'</tr></thead></table><div class="no-findings">✅ No findings match your filters.</div>';
    var rows=findings.map(function(f){
      var fixCell=f.fix?(f.fix.auto?'<span class="fix-chip">auto</span>':'<span class="code">'+esc((f.fix.description||"").substring(0,40))+'</span>'):"—";
      return'<tr><td>'+sevBadge(f.severity)+'</td><td><span class="cat-badge">'+esc(f.category)+'</span></td><td>'+esc(f.title)+'</td><td class="code">'+esc(f.file||"")+'</td><td>'+(f.line!=null?f.line:"—")+'</td><td class="code">'+esc((f.evidence||"").substring(0,60))+'</td><td>'+fixCell+'</td></tr>';
    }).join("");
    return'<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
  }
  function render(){
    if(!report)return;
    var s=report.summary||{},score=report.score||{},grade=score.grade||"F",numeric=score.numericScore||0;
    var framework=report.framework||(report.target&&report.target.framework)||"unknown";
    var autoFixable=allFindings.filter(function(f){return f.fix&&f.fix.auto;}).length;
    var filtered=applyFilters();
    var cats=[...new Set(allFindings.map(function(f){return f.category;}))].sort();
    var catOpts=["all"].concat(cats).map(function(c){return'<option value="'+c+'" '+(filterCategory===c?"selected":"")+'>'+c+'</option>';}).join("");
    document.getElementById("app").innerHTML=
      '<div class="header">'+
      '<div>'+buildRing(numeric,grade)+'</div>'+
      '<div class="header-info">'+
      '<div class="header-title">AgentShield '+
      '<span class="grade-badge" style="background:'+gradeColor(grade)+'20;color:'+gradeColor(grade)+';border:2px solid '+gradeColor(grade)+'40">'+grade+'</span>'+
      '<span class="framework-badge">'+esc(framework)+'</span></div>'+
      '<div class="header-meta">Target: '+esc(report.targetPath||(report.target&&report.target.path)||"—")+'<br>Scanned: '+(report.timestamp?new Date(report.timestamp).toLocaleString():"—")+'<br>'+(s.filesScanned??0)+' files · '+(s.totalFindings??0)+' findings · '+autoFixable+' auto-fixable</div>'+
      '</div><button class="refresh-btn" id="refreshBtn">↻ Refresh</button></div>'+
      '<div class="stats-row">'+
      '<div class="stat-card critical"><div class="stat-value">'+(s.critical??0)+'</div><div class="stat-label">Critical</div></div>'+
      '<div class="stat-card high"><div class="stat-value">'+(s.high??0)+'</div><div class="stat-label">High</div></div>'+
      '<div class="stat-card medium"><div class="stat-value">'+(s.medium??0)+'</div><div class="stat-label">Medium</div></div>'+
      '<div class="stat-card low"><div class="stat-value">'+(s.low??0)+'</div><div class="stat-label">Low</div></div>'+
      '<div class="stat-card"><div class="stat-value">'+(s.info??0)+'</div><div class="stat-label">Info</div></div>'+
      '<div class="stat-card"><div class="stat-value">'+(s.filesScanned??0)+'</div><div class="stat-label">Files</div></div>'+
      '<div class="stat-card"><div class="stat-value" style="color:var(--grade-a)">'+autoFixable+'</div><div class="stat-label">Auto-fixable</div></div>'+
      '</div>'+
      '<div class="section"><div class="section-title">Findings by Category</div>'+buildBars(allFindings)+'</div>'+
      '<div class="section"><div class="section-title">Findings</div>'+
      '<div class="filters">'+
      '<select class="filter-select" id="sevFilter"><option value="all" '+(filterSeverity==="all"?"selected":"")+'>All severities</option>'+["critical","high","medium","low","info"].map(function(sv){return'<option value="'+sv+'" '+(filterSeverity===sv?"selected":"")+'>'+sv+'</option>';}).join("")+'</select>'+
      '<select class="filter-select" id="catFilter">'+catOpts+'</select>'+
      '<input class="filter-input" id="textFilter" placeholder="Search title, file, evidence…" value="'+esc(filterText)+'">'+
      '<button class="fix-all-btn" id="fixAllBtn">⚡ Fix All Auto-fixable ('+autoFixable+')</button></div>'+
      '<div class="count-label">'+filtered.length+' of '+allFindings.length+' findings</div>'+
      '<div class="table-wrap" id="tableWrap">'+buildTable(filtered)+'</div></div>';
    document.getElementById("refreshBtn").addEventListener("click",loadData);
    document.getElementById("sevFilter").addEventListener("change",function(e){filterSeverity=e.target.value;render();});
    document.getElementById("catFilter").addEventListener("change",function(e){filterCategory=e.target.value;render();});
    document.getElementById("textFilter").addEventListener("input",function(e){filterText=e.target.value;render();});
    document.getElementById("fixAllBtn").addEventListener("click",function(){alert("Run `agentshield scan --fix` to apply "+autoFixable+" auto-fixable findings.");});
    document.querySelectorAll("th[data-col]").forEach(function(th){
      th.addEventListener("click",function(){var col=th.dataset.col;if(sortCol===col){sortDir*=-1;}else{sortCol=col;sortDir=1;}render();});
    });
  }
  function loadData(){
    fetch("scan-results.json?t="+Date.now())
      .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(function(data){report=data;allFindings=Array.isArray(data.findings)?data.findings:[];render();})
      .catch(function(err){
        document.getElementById("app").innerHTML='<div class="no-data"><div style="font-size:40px;margin-bottom:16px">🛡️</div><div style="color:var(--text);font-size:18px;margin-bottom:8px">AgentShield Dashboard</div><div>Could not load <code>scan-results.json</code>: '+esc(err.message)+'</div><div style="margin-top:12px;font-size:12px;color:var(--text2)">Run: <code>agentshield scan --format html</code> to generate results.</div></div>';
      });
  }
  loadData();
  setInterval(loadData,30000);
})();
</script>
</body>
</html>
